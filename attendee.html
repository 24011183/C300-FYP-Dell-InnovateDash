  <title>Dell InnovateDash - Attendee Registration</title>
  <style>
    /* Dell Dashboard Brand Standards Theme */
    body {

<body>

  <div class="form-container">
    <div class="brand-header">
      <div class="dell-badge">DELL</div>
      <h1>Event Lead Capture</h1>
    </div>
    <div class="subtitle">Enter corporate attendee profile coordinates for AI scoring analysis.</div>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Name" required>
      </div>

      <div class="form-group">
        <label for="company">Company Name</label>
        <input type="text" id="company" placeholder="Company" required>
      </div>

      <div class="form-group">
        <label for="companySize">Company Size</label>
        <input type="number" id="companySize" placeholder="Company Size (No. of Employees)" required>
      </div>

      <div class="form-group">
        <label for="jobTitle">Job Title / Role</label>
        <input type="text" id="jobTitle" placeholder="Job Title / Role" required>
      </div>

      <div class="form-group">
        <label for="interest">Strategic Interest</label>
        <input type="text" id="interest" placeholder="Interest" required>
      </div>

      <button type="submit">Register</button>
    </form>
    
    <div class="footer-note">Dell Forum AI Routing Engine · Secure Node Intake Node</div>
    <div class="dell-brand-bar">
      <div class="dell-logo-text">DELL</div>
      <div class="system-status">NFC Scanner Active</div>
    </div>

    <div class="form-content">
      <p class="form-header-desc">Tap NFC Badge or Submit Attendee Credentials Below</p>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="company">Company</label>
          <input type="text" id="company" placeholder="Dell Technologies" required>
        </div>

        <div class="form-group">
          <label for="companySize">Company Size</label>
          <input type="number" id="companySize" placeholder="e.g. 500" required>
        </div>

        <div class="form-group">
          <label for="jobTitle">Job Title / Role</label>
          <input type="text" id="jobTitle" placeholder="e.g. Infrastructure Director" required>
        </div>

        <div class="form-group">
          <label for="interest">Strategic Focus Area</label>
          <select id="interest" required>
            <option value="" disabled selected>Select Business Unit</option>
            <option value="AI PCs">AI PCs (Client Solutions Group)</option>
            <option value="Storage">Storage (Infrastructure Solutions)</option>
            <option value="Cloud">Cloud (APEX & Cloud Services)</option>
            <option value="Consultancy">Consultancy (Professional Services)</option>
          </select>
        </div>

        <button type="submit">Submit Registration Data</button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById("registerForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      // Unified Data Object with all Member 4 evaluation metrics
      const attendee = {
        name: document.getElementById("name").value,
        company: document.getElementById("company").value,
        companySize: parseInt(document.getElementById("companySize").value) || 0,
        jobTitle: document.getElementById("jobTitle").value,
        interest: document.getElementById("interest").value
      };

      // Network request pipeline sending payload data to server endpoints
      const response = await fetch("/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(attendee)
      });

      const data = await response.json();

      // Notifies user and displays returned metadata structure in log
      alert(data.message);
      form.reset(); 
      console.log("Response from server:", data);
      try {
        const response = await fetch("/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(attendee)
        });

        const data = await response.json();

        // Standard notification callback alert
        alert(data.message);
        console.log("Transmission Successful:", data);
        
        // Wipe fields clean for the next queue tap loop
        form.reset();
      } catch (error) {
        console.error("Transmission interruption encountered:", error);
        alert("Server transmission offline. Running locally on internal backup stack.");
      }
    });
  </script>

</body>
