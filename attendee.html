<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dell InnovateDash - Attendee Registration</title>
  <style>
    :root {
      --dell-blue: #0076ce;
      --dell-dark: #0b111e;
      --panel-bg: #111827;
      --border-color: #1f2937;
      --text-main: #f8fafc;
      --text-muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    body {
      background-color: var(--dell-dark);
      background-image: linear-gradient(180deg, #0b111e 0%, #070a12 100%);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .form-container {
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
      width: 100%;
      max-width: 460px;
      overflow: hidden;
    }

    /* Official Dell Tech Top Header Bar */
    .dell-brand-bar {
      background-color: var(--dell-blue);
      padding: 15px 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #005da3;
    }

    .dell-logo-text {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .system-status {
      font-size: 11px;
      color: #93c5fd;
      background-color: rgba(255, 255, 255, 0.1);
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-content {
      padding: 35px 30px;
    }

    .form-header-desc {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: -5px;
      margin-bottom: 25px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background-color: #1f2937;
      border: 1px solid #374151;
      border-radius: 4px;
      color: #fff;
      font-size: 15px;
      transition: all 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--dell-blue);
      box-shadow: 0 0 0 3px rgba(0, 118, 206, 0.25);
    }

    input::placeholder {
      color: #4b5563;
    }

    button {
      width: 100%;
      background-color: var(--dell-blue);
      border: none;
      border-radius: 4px;
      color: white;
      padding: 15px;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 15px;
    }

    button:hover {
      background-color: #005da3;
      box-shadow: 0 4px 12px rgba(0, 118, 206, 0.3);
    }

    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

  <div class="form-container">
    <div class="dell-brand-bar">
      <div class="dell-logo-text">DELL</div>
      <div class="system-status">NFC Scanner Active</div>
    </div>

    <div class="form-content">
      <p class="form-header-desc">Tap NFC Badge or Submit Attendee Credentials Below</p>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="company">Company</label>
          <input type="text" id="company" placeholder="Dell Technologies" required>
        </div>

        <div class="form-group">
          <label for="companySize">Company Size</label>
          <input type="number" id="companySize" placeholder="e.g. 500" required>
        </div>

        <div class="form-group">
          <label for="jobTitle">Job Title / Role</label>
          <input type="text" id="jobTitle" placeholder="e.g. Infrastructure Director" required>
        </div>

        <div class="form-group">
          <label for="interest">Strategic Focus Area</label>
          <input type="text" id="interest" placeholder="e.g. AI PCs, Storage, Cloud" required>
        </div>

        <button type="submit">Submit Registration Data</button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById("registerForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const attendee = {
        name: document.getElementById("name").value,
        company: document.getElementById("company").value,
        companySize: parseInt(document.getElementById("companySize").value) || 0,
        jobTitle: document.getElementById("jobTitle").value,
        interest: document.getElementById("interest").value
      };

      try {
        const response = await fetch("/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(attendee)
        });

        const data = await response.json();

        // Standard notification callback alert
        alert(data.message);
        console.log("Transmission Successful:", data);
        
        // Wipe fields clean for next queue loop
        form.reset();
      } catch (error) {
        console.error("Transmission interruption encountered:", error);
        alert("Server transmission offline. Running locally on internal backup stack.");
      }
    });
  </script>

</body>
</html>
