<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dell Technologies — Event Lead Capture Platform</title>
  <style>
    :root {
      --dell-blue: #007db8;
      --dell-dark: #062340;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .form-container {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      width: 100%;
      max-width: 480px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .brand-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .dell-badge {
      background: var(--dell-blue);
      color: white;
      font-weight: 800;
      padding: 4px 10px;
      font-size: 13px;
      letter-spacing: 1px;
      border-radius: 3px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-main);
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 12px 16px;
      color: var(--text-main);
      font-size: 15px;
      transition: all 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--dell-blue);
      box-shadow: 0 0 0 3px rgba(0, 125, 184, 0.2);
    }

    input::placeholder {
      color: #475569;
    }

    button {
      width: 100%;
      background: var(--dell-blue);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #006699;
    }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: #475569;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <div class="brand-header">
      <div class="dell-badge">DELL</div>
      <h1>Event Lead Capture</h1>
    </div>
    <div class="subtitle">Enter corporate attendee profile coordinates for AI scoring analysis.</div>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Name" required>
      </div>

      <div class="form-group">
        <label for="company">Company Name</label>
        <input type="text" id="company" placeholder="Company" required>
      </div>

      <div class="form-group">
        <label for="companySize">Company Size</label>
        <input type="number" id="companySize" placeholder="Company Size (No. of Employees)" required>
      </div>

      <div class="form-group">
        <label for="jobTitle">Job Title / Role</label>
        <input type="text" id="jobTitle" placeholder="Job Title / Role" required>
      </div>

      <div class="form-group">
        <label for="interest">Strategic Interest</label>
        <input type="text" id="interest" placeholder="Interest" required>
      </div>

      <button type="submit">Register</button>
    </form>
    
    <div class="footer-note">Dell Forum AI Routing Engine · Secure Node Intake Node</div>
  </div>

  <script>
    const form = document.getElementById("registerForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      // Unified Data Object with all Member 4 evaluation metrics
      const attendee = {
        name: document.getElementById("name").value,
        company: document.getElementById("company").value,
        companySize: document.getElementById("companySize").value,
        jobTitle: document.getElementById("jobTitle").value,
        interest: document.getElementById("interest").value
      };

      // Network request pipeline sending payload data to server endpoints
      const response = await fetch("/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(attendee)
      });

      const data = await response.json();

      // Notifies user and displays returned metadata structure in log
      alert(data.message);
      form.reset(); 
      console.log("Response from server:", data);
    });
  </script>

</body>
</html>
