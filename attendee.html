<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dell QuickTap Connect — Booth Registration</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #0b111e;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .form-card {
      background: #111827;
      border: 1px solid #1f2937;
      border-top: 4px solid #0076ce;
      border-radius: 8px;
      width: 100%;
      max-width: 480px;
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .brand-header {
      text-align: center;
      margin-bottom: 25px;
    }
    .brand-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .brand-header p {
      font-size: 13px;
      color: #93c5fd;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }
    
    .form-group.row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      background: #1f2937;
      border: 1px solid #374151;
      color: #fff;
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #0076ce;
      box-shadow: 0 0 0 3px rgba(0, 118, 206, 0.2);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.5;
    }

    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 20px 0;
      background: rgba(31, 41, 55, 0.4);
      padding: 12px;
      border-radius: 4px;
      border: 1px solid #1f2937;
    }
    .checkbox-group input {
      margin-top: 3px;
      cursor: pointer;
    }
    .checkbox-group label {
      text-transform: none;
      font-size: 12px;
      color: #cbd5e1;
      line-height: 1.5;
      cursor: pointer;
      user-select: none;
    }

    .submit-btn {
      width: 100%;
      background: #0076ce;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-btn:hover {
      background: #005da3;
    }
    .submit-btn:disabled {
      background: #4b5563;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .message-box {
      margin-top: 15px;
      padding: 12px;
      border-radius: 4px;
      font-size: 13px;
      display: none;
      line-height: 1.4;
    }
    .message-box.success {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.4);
      color: #4ade80;
    }
    .message-box.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #f87171;
    }
  </style>
</head>
<body>

<div class="form-card">
  <div class="brand-header">
    <h1>Dell Technologies</h1>
    <p>QuickTap Forum Connect Registration</p>
    </div>

  <form id="regForm" onsubmit="submitRegistration(event)">

        <div class="form-group">
      <label for="name">Full Name *</label>
      <input type="text" id="name" required placeholder="e.g. John Doe">
        </div>

        <div class="form-group">
      <label for="company">Company Name *</label>
      <input type="text" id="company" required placeholder="e.g. Nexus Solutions Ltd">
        </div>

    <div class="form-group row">
      <div>
        <label for="companySize">Company Size (Emp) *</label>
        <input type="number" id="companySize" required min="1" placeholder="e.g. 250">
        </div>
      <div>
        <label for="jobTitle">Job Title *</label>
        <input type="text" id="jobTitle" required placeholder="e.g. IT Director">
      </div>
        </div>

    <div class="form-group row">
      <div>
        <label for="email">Work Email *</label>
        <input type="email" id="email" required placeholder="name@company.com">
      </div>
      <div>
          <label for="phone">Phone Number</label>
        <input type="text" id="phone" placeholder="e.g. +65 9123 4567">
      </div>
        </div>

        <div class="form-group">
      <label for="interest">Primary Solution Interest *</label>
          <select id="interest" required>
        <option value="" disabled selected>Select an infrastructure focus...</option>
        <option value="AI PCs">💻 Client Solutions (AI PCs & Workstations)</option>
        <option value="Storage">🗄️ Infrastructure Solutions (Data & Storage)</option>
        <option value="Cloud">☁️ APEX Ecosystem (Hybrid & Multicloud Services)</option>
        <option value="Consultancy">🛠️ Professional Deployment & Consultancy Services</option>
          </select>
        </div>

    <!-- Redesigned Feature 3 Contextual Input Space -->
        <div class="form-group">
      <label for="currentChallenge">Current Challenge or Infrastructure Goals (Optional)</label>
      <textarea id="currentChallenge" placeholder="e.g. Looking to refresh our employee notebook fleet with AI capabilities, upgrade storage arrays, or fix transaction latency issues..."></textarea>
        </div>

    <div class="checkbox-group">
      <input type="checkbox" id="pdpaConsent" required>
      <label for="pdpaConsent">
        I consent to Dell Technologies collecting my data for event follow-up actions and technical scoping communications in accordance with the PDPA guidelines. *
          </label>
        </div>

    <button type="submit" id="submitBtn" class="submit-btn">Register and Connect</button>
      </form>

  <div id="messageBox" class="message-box"></div>
  </div>

  <script>
  async function submitRegistration(event) {
    event.preventDefault();
    
    const submitBtn = document.getElementById("submitBtn");
    const msgBox = document.getElementById("messageBox");
    
      submitBtn.disabled = true;
    msgBox.style.display = "none";
    msgBox.className = "message-box";

    const payload = {
      name: document.getElementById("name").value.trim(),
      company: document.getElementById("company").value.trim(),
        companySize: parseInt(document.getElementById("companySize").value) || 0,
      jobTitle: document.getElementById("jobTitle").value.trim(),
      email: document.getElementById("email").value.trim(),
      phone: document.getElementById("phone").value.trim(),
        interest: document.getElementById("interest").value,
      currentChallenge: document.getElementById("currentChallenge").value.trim(),
      pdpaConsent: document.getElementById("pdpaConsent").checked
      };

      try {
        const response = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
        });

        const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || "Registration failed.");
      }

      msgBox.textContent = data.message || "Success! Welcome to the Dell Technologies Forum.";
      msgBox.classList.add("success");
      msgBox.style.display = "block";
      
      // Clear form inputs on successful capture
      document.getElementById("regForm").reset();

    } catch (err) {
      msgBox.textContent = "❌ " + err.message;
      msgBox.classList.add("error");
      msgBox.style.display = "block";
      } finally {
        submitBtn.disabled = false;
      }
  }
  </script>
</body>
</html>
