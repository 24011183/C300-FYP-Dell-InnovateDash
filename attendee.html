<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickTap Connect — Lead Registration</title>
  <style>
    /* Dell Dashboard Brand Standards Theme */
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #0b111e; /* Core Dark Slate Dashboard background */
      background-image: linear-gradient(180deg, #0b111e 0%, #070a12 100%);
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .form-container {
      background-color: #111827;
      border: 1px solid #1f2937;
      border-radius: 8px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
      width: 100%;
      max-width: 460px;
      overflow: hidden; /* Keeps brand bar corner radius aligned */
    }

    /* Official Dell Tech Top Header Bar */
    .dell-brand-bar {
      background-color: #0076ce; /* Official Dell Blue */
      padding: 15px 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #005da3;
    }

    .dell-logo-text {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .system-status {
      font-size: 11px;
      color: #93c5fd;
      background-color: rgba(255, 255, 255, 0.1);
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-content {
      padding: 35px 30px;
    }

    .form-header-desc {
      font-size: 14px;
      color: #9ca3af;
      margin-top: -5px;
      margin-bottom: 25px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 12px 16px;
      background-color: #1f2937;
      border: 1px solid #374151;
      border-radius: 4px;
      color: #fff;
      font-size: 15px;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #0076ce;
      box-shadow: 0 0 0 3px rgba(0, 118, 206, 0.25);
    }

    input::placeholder {
      color: #4b5563;
    }

    /* Custom drop down arrow layout overrides */
    select {
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 15px;
      background-color: #0076ce;
      border: none;
      border-radius: 4px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 15px;
    }

    button:hover {
      background-color: #005da3;
      box-shadow: 0 4px 12px rgba(0, 118, 206, 0.3);
    }

    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

  <div class="form-container">
    <div class="dell-brand-bar">
      <div class="dell-logo-text">DELL</div>
      <div class="system-status">QuickTap Connect</div>
    </div>

    <div class="form-content">
      <p class="form-header-desc">Register your interest to connect with the right Dell team</p>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="company">Company</label>
          <input type="text" id="company" placeholder="Dell Technologies" required>
        </div>

        <div class="form-group">
          <label for="companySize">Company Size</label>
          <input type="number" id="companySize" placeholder="e.g. 500" required>
        </div>

        <div class="form-group">
          <label for="jobTitle">Job Title / Role</label>
          <input type="text" id="jobTitle" placeholder="e.g. Infrastructure Director" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="e.g. john@company.com" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="e.g. +65 9123 4567" required>
        </div>

        <div class="form-group">
          <label for="interest">Strategic Focus Area</label>
          <select id="interest" required>
            <option value="" disabled selected>Select Business Unit</option>
            <option value="AI PCs">AI PCs (Client Solutions Group)</option>
            <option value="Storage">Storage (Infrastructure Solutions)</option>
            <option value="Cloud">Cloud (APEX & Cloud Services)</option>
            <option value="Consultancy">Consultancy (Professional Services)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="currentChallenge">Current IT Challenge (Optional)</label>
          <input type="text" id="currentChallenge" placeholder="e.g. Managing hybrid cloud costs">
        </div>

        <div class="form-group" style="background:#1a2235;border:1px solid #374151;border-radius:6px;padding:14px 16px;">
          <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:13px;color:#cbd5e1;font-weight:400;">
            <input type="checkbox" id="pdpaConsent" required style="width:16px;height:16px;flex-shrink:0;margin-top:2px;accent-color:#0076ce;">
            <span>
              I consent to Dell Technologies collecting and processing my personal data for sales follow-up purposes in accordance with Dell's 
              <a href="https://www.dell.com/en-sg/lp/privacy-center" target="_blank" style="color:#60a5fa;">Privacy Policy</a>.
              Data will not be shared with third parties and may be deleted upon request.
            </span>
          </label>
        </div>

        <button type="submit">Submit Registration Data</button>
      </form>
    </div>
  </div>

  <div id="queueMsg" style="text-align:center;font-size:12px;color:#f59e0b;padding:8px 20px;display:block;"></div>

  <script>
    const QUEUE_KEY = "dell_lead_queue";

    // ── OFFLINE QUEUE HELPERS ──
    const getQueue = () => JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]");
    const saveQueue = (q) => localStorage.setItem(QUEUE_KEY, JSON.stringify(q));

    const tryFlushQueue = async () => {
      const q = getQueue();
      if (!q.length) return;
      const remaining = [];
      for (const entry of q) {
        try {
          const res = await fetch("/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(entry)
          });
          if (!res.ok) remaining.push(entry);
          else console.log("📤 Queued lead flushed:", entry.name);
        } catch {
          remaining.push(entry);
        }
      }
      saveQueue(remaining);
      if (remaining.length < q.length) {
        const msg = document.getElementById("queueMsg");
        if (msg) msg.textContent = remaining.length
          ? `⚠️ ${remaining.length} lead(s) still queued offline.`
          : "✅ All offline leads synced to server.";
      }
    };

    // Flush any queued leads when coming back online
    window.addEventListener("online", () => {
      console.log("🌐 Back online — flushing offline queue...");
      tryFlushQueue();
    });

    // Try flushing on page load too
    tryFlushQueue();

    const form = document.getElementById("registerForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const submitBtn = form.querySelector("button[type='submit']");
      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      const pdpaConsent = document.getElementById("pdpaConsent").checked;
      if (!pdpaConsent) {
        alert("PDPA consent is required before registration can proceed.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Registration Data";
        return;
      }

      const attendee = {
        name: document.getElementById("name").value,
        company: document.getElementById("company").value,
        companySize: parseInt(document.getElementById("companySize").value) || 0,
        jobTitle: document.getElementById("jobTitle").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        interest: document.getElementById("interest").value,
        currentChallenge: document.getElementById("currentChallenge").value,
        pdpaConsent: true
      };

      try {
        const response = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(attendee)
        });

        const data = await response.json();
        if (data.duplicate) {
          alert(`ℹ️ ${data.message}`);
        } else {
          alert("✅ Registration successful! Lead routed to " + (data.lead?.assigned_team || "the relevant team") + ".");
        }
        console.log("Transmission Successful:", data);
        form.reset();
      } catch (error) {
        // ── OFFLINE FALLBACK: queue locally and retry when back online ──
        console.warn("🔴 Server offline — queuing lead locally:", attendee.name);
        const q = getQueue();
        attendee._queued_at = new Date().toISOString();
        q.push(attendee);
        saveQueue(q);
        const msg = document.getElementById("queueMsg");
        if (msg) msg.textContent = `⚠️ Server offline. ${q.length} lead(s) queued locally — will auto-sync when connection is restored.`;
        alert(`⚠️ Server currently offline.

"${attendee.name}" has been saved locally and will be submitted automatically when the connection is restored.`);
        form.reset();
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Registration Data";
      }
    });
  </script>

</body>
</html>
