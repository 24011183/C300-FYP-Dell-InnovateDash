<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dell Forum — AI Lead Intelligence</title>
    <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

<header>
    <div class="header-left">
        <div class="dell-badge">DELL</div>
        <h1>Lead <span>Intelligence</span> Dashboard</h1>
    </div>
    <div class="live-badge">
        <div class="live-dot"></div>
        <span>AI Engine Active</span>
    </div>
</header>

<main>

    <!-- ── SUMMARY STATS ── -->
    <div class="section-label">Event Overview</div>
    <div class="stats-row" id="stats-row">
        <!-- injected by JS -->
    </div>

    <div class="content-grid">

        <!-- ── LEAD CARDS ── -->
        <div class="leads-column">
            <div class="section-label">Processed Leads</div>
            <div id="leads-container">
                <!-- injected by JS -->
            </div>
        </div>

        <!-- ── RIGHT PANEL ── -->
        <aside class="right-panel">

            <!-- Score Distribution -->
            <div class="panel-card">
                <div class="panel-title">Score Distribution</div>
                <div id="dist-container"></div>
            </div>

            <!-- Team Distribution Chart -->
            <div class="panel-card">
                <div class="panel-title">Team Routing</div>
                <div class="bar-chart" id="bar-chart"></div>
            </div>

        </aside>
    </div>

</main>

<footer class="footer">
    Dell Forum AI Routing Engine &nbsp;·&nbsp; Member 4: Smart Routing & Analytics &nbsp;·&nbsp;
    <span id="footer-time"></span>
</footer>

<!-- ── ROUTING LOGIC (from routing.js) ── -->
<script>

// ── PASTE YOUR routing.js CONTENT HERE ──
// (or load via <script src="routing.js"> if serving from a local server)

const analyzeLead = (attendee) => {
    const teamRoutes = {
        'AI PCs':       'Client Solutions Group (CSG)',
        'Storage':      'Infrastructure Solutions Group (ISG)',
        'Cloud':        'APEX & Cloud Services',
        'Consultancy':  'Professional Services'
    };

    let score = 0;

    if (attendee.companySize > 500) score += 40;
    else if (attendee.companySize > 100) score += 25;
    else score += 10;

    const role = attendee.jobTitle ? attendee.jobTitle.toLowerCase() : '';
    if (role.includes('director') || role.includes('manager') || role.includes('lead')) {
        score += 30;
    } else {
        score += 15;
    }

    if (attendee.interest === 'AI PCs' || attendee.interest === 'Cloud') {
        score += 30;
    } else {
        score += 15;
    }

    let priorityLabel = 'Cold';
    let priorityColor = '#4a5568';
    let tier = 'cold';

    if (score >= 80) {
        priorityLabel = 'Hot Lead (VIP)';
        priorityColor = '#e63946';
        tier = 'hot';
    } else if (score >= 50) {
        priorityLabel = 'Warm Lead';
        priorityColor = '#f4a261';
        tier = 'warm';
    }

    let recommendation = 'Assign to general nurturing newsletter.';
    if (score >= 80) {
        recommendation = `Schedule 1-on-1 discovery call for ${attendee.interest} within 24 hours. Send Enterprise Catalog.`;
    } else if (score >= 50) {
        recommendation = `Invite to upcoming Dell ${attendee.interest} tech webinar and track email open rate.`;
    }

    return {
        ...attendee,
        lead_score: score,
        tier,
        assigned_team: teamRoutes[attendee.interest] || 'General Sales',
        priority_level: priorityLabel,
        priority_color: priorityColor,
        action_recommendation: recommendation,
        processed_at: new Date().toLocaleString()
    };
};

const generateEventAnalytics = (allLeads) => ({
    total_leads: allLeads.length,
    hot_count:  allLeads.filter(l => l.tier === 'hot').length,
    warm_count: allLeads.filter(l => l.tier === 'warm').length,
    cold_count: allLeads.filter(l => l.tier === 'cold').length,
    team_distribution: allLeads.reduce((acc, lead) => {
        acc[lead.assigned_team] = (acc[lead.assigned_team] || 0) + 1;
        return acc;
    }, {}),
    avg_score: Math.round(allLeads.reduce((s, l) => s + l.lead_score, 0) / allLeads.length)
});

// ── MOCK DATA — swap in real NFC data from Member 3 ──
const mockLeads = [
    { name: "Lim Wee Teck",  company: "Dell Technologies",  companySize: 650, jobTitle: "IT Director", interest: "AI PCs" },
    { name: "John Tan",       company: "SME Pte Ltd",        companySize: 50,  jobTitle: "Engineer",    interest: "Storage" },
    { name: "Sarah Cheng",    company: "MidCorp",            companySize: 250, jobTitle: "Tech Lead",   interest: "Cloud" },
    { name: "Ravi Kumar",     company: "FinServe Asia",      companySize: 820, jobTitle: "IT Manager",  interest: "Cloud" },
    { name: "Jessica Wong",   company: "StartupX",           companySize: 30,  jobTitle: "Developer",   interest: "AI PCs" }
];

// ── PROCESS LEADS ──
const processedLeads = mockLeads.map(analyzeLead);
const analytics = generateEventAnalytics(processedLeads);

// ── RENDER HELPERS ──

function buildScoreRing(score, tier) {
    const colors = { hot: '#e63946', warm: '#f4a261', cold: '#4a5568' };
    const color = colors[tier];
    const r = 28;
    const circ = 2 * Math.PI * r;
    const offset = circ - (score / 100) * circ;
    const id = 'ring-' + Math.random().toString(36).slice(2);
    setTimeout(() => {
        const el = document.getElementById(id);
        if (el) el.style.strokeDashoffset = offset;
    }, 100);
    return `
        <div class="score-ring">
            <svg viewBox="0 0 72 72" width="72" height="72">
                <circle class="track" cx="36" cy="36" r="${r}"/>
                <circle id="${id}" class="fill" cx="36" cy="36" r="${r}"
                    stroke="${color}"
                    stroke-dasharray="${circ}"
                    stroke-dashoffset="${circ}"/>
            </svg>
            <div class="score-number" style="color:${color}">${score}</div>
        </div>`;
}

function renderLeads(leads) {
    const container = document.getElementById('leads-container');
    container.innerHTML = leads
        .sort((a, b) => b.lead_score - a.lead_score)
        .map(lead => `
        <div class="lead-card ${lead.tier}">
            <div>
                <div class="lead-name">${lead.name}</div>
                <div class="lead-meta">${lead.jobTitle} &nbsp;·&nbsp; ${lead.company} &nbsp;·&nbsp; ${lead.companySize.toLocaleString()} employees</div>
                <div class="lead-tags">
                    <span class="tag">📡 ${lead.interest}</span>
                    <span class="tag team">→ ${lead.assigned_team}</span>
                </div>
                <div class="recommendation">${lead.action_recommendation}</div>
            </div>
            <div class="score-side">
                ${buildScoreRing(lead.lead_score, lead.tier)}
                <div class="priority-badge ${lead.tier}">${lead.priority_level}</div>
                <div class="processed-time">${lead.processed_at}</div>
            </div>
        </div>`).join('');
}

function renderStats(a) {
    document.getElementById('stats-row').innerHTML = `
        <div class="stat-card">
            <div class="stat-value">${a.total_leads}</div>
            <div class="stat-label">Total Leads</div>
        </div>
        <div class="stat-card hot">
            <div class="stat-value" style="color:#e63946">${a.hot_count}</div>
            <div class="stat-label">Hot (VIP)</div>
        </div>
        <div class="stat-card warm">
            <div class="stat-value" style="color:#f4a261">${a.warm_count}</div>
            <div class="stat-label">Warm</div>
        </div>
        <div class="stat-card cold">
            <div class="stat-value" style="color:#8899aa">${a.cold_count}</div>
            <div class="stat-label">Cold</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" style="color:#00c2ff">${a.avg_score}</div>
            <div class="stat-label">Avg Score</div>
        </div>`;
}

function renderDistribution(a) {
    document.getElementById('dist-container').innerHTML = `
        <div class="dist-row">
            <div class="dist-dot" style="background:#e63946"></div>
            <div class="dist-label">Hot Leads</div>
            <div class="dist-count" style="color:#e63946">${a.hot_count}</div>
        </div>
        <div class="dist-row">
            <div class="dist-dot" style="background:#f4a261"></div>
            <div class="dist-label">Warm Leads</div>
            <div class="dist-count" style="color:#f4a261">${a.warm_count}</div>
        </div>
        <div class="dist-row">
            <div class="dist-dot" style="background:#4a5568"></div>
            <div class="dist-label">Cold Leads</div>
            <div class="dist-count" style="color:#8899aa">${a.cold_count}</div>
        </div>`;
}

function renderBarChart(a) {
    const teams = Object.entries(a.team_distribution);
    const max = Math.max(...teams.map(([,v]) => v));
    document.getElementById('bar-chart').innerHTML = teams.map(([team, count]) => `
        <div class="bar-row">
            <div class="bar-label-row">
                <span class="bar-label">${team.replace(' (', '\n(')}</span>
                <span class="bar-count">${count}</span>
            </div>
            <div class="bar-track">
                <div class="bar-fill" data-width="${(count / max) * 100}"></div>
            </div>
        </div>`).join('');

    setTimeout(() => {
        document.querySelectorAll('.bar-fill').forEach(el => {
            el.style.width = el.dataset.width + '%';
        });
    }, 200);
}

// ── INIT ──
renderStats(analytics);
renderLeads(processedLeads);
renderDistribution(analytics);
renderBarChart(analytics);
document.getElementById('footer-time').textContent = new Date().toLocaleString();

</script>
</body>
</html>
