<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dell Team Lead View</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #0b111e;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 0;
    }

    .brand-bar {
      background-color: #0076ce;
      padding: 15px 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #005da3;
    }

    .brand-bar .logo {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .brand-bar .subtitle {
      font-size: 13px;
      color: #93c5fd;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #93c5fd;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: livepulse 1.5s ease-in-out infinite;
    }

    @keyframes livepulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .last-updated {
      font-size: 11px;
      color: #4b5563;
      margin-top: 6px;
    }

    /* Tier color coding */
    .tier-label {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .tier-enterprise {
      background: rgba(234, 179, 8, 0.15);
      border: 1px solid rgba(234, 179, 8, 0.4);
      color: #eab308;
    }

    .tier-midmarket {
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.4);
      color: #a78bfa;
    }

    .tier-small {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
    }

    /* Card left border by tier */
    .lead-card.enterprise { border-left: 3px solid #eab308; }
    .lead-card.midmarket  { border-left: 3px solid #a78bfa; }
    .lead-card.small      { border-left: 3px solid #4ade80; }

    .tier-section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 6px 0;
      margin: 0 0 10px 0;
      border-bottom: 1px solid #1f2937;
    }

    .tier-section-title.enterprise { color: #eab308; }
    .tier-section-title.midmarket  { color: #a78bfa; }
    .tier-section-title.small      { color: #4ade80; }

    .team-selector {
      background: #111827;
      border-bottom: 1px solid #1f2937;
      padding: 20px 30px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .team-selector label {
      font-size: 13px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .team-selector select {
      background: #1f2937;
      border: 1px solid #374151;
      color: #fff;
      font-size: 14px;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      min-width: 260px;
    }

    .team-selector select:focus {
      outline: none;
      border-color: #0076ce;
    }

    .team-selector button {
      background: #0076ce;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }

    .team-selector button:hover { background: #005da3; }

    .main {
      padding: 30px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .team-header {
      display: none;
      margin-bottom: 24px;
    }

    .team-header h2 {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }

    .team-header p {
      font-size: 13px;
      color: #9ca3af;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 6px;
      padding: 16px;
      text-align: center;
    }

    .stat-card .stat-num {
      font-size: 28px;
      font-weight: 700;
      color: #0076ce;
    }

    .stat-card .stat-label {
      font-size: 11px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .leads-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .tier-column {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .lead-card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .lead-card:hover { border-color: #0076ce; }

    .lead-card-header {
      background: #0f1a2e;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #1f2937;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #0076ce;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .lead-name {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .lead-title {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 2px;
    }

    .lead-card-body {
      padding: 16px 18px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #1f2937;
      font-size: 13px;
    }

    .info-row:last-of-type { border-bottom: none; }

    .info-row .info-label {
      color: #9ca3af;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .info-row .info-value {
      color: #e2e8f0;
      font-weight: 500;
      text-align: right;
      max-width: 60%;
    }

    .interest-badge {
      display: inline-block;
      background: rgba(0, 118, 206, 0.15);
      border: 1px solid rgba(0, 118, 206, 0.4);
      color: #60a5fa;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .recommendation-box {
      background: #0f1a2e;
      border: 1px solid #1f3a5f;
      border-left: 3px solid #0076ce;
      border-radius: 4px;
      padding: 12px 14px;
      margin-top: 14px;
    }

    .recommendation-box .rec-label {
      font-size: 10px;
      color: #60a5fa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .recommendation-box .rec-text {
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .processed-time {
      font-size: 11px;
      color: #4b5563;
      margin-top: 10px;
      text-align: right;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #4b5563;
      display: none;
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 15px;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: #9ca3af;
      display: none;
    }

    .error-msg {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #f87171;
      padding: 14px 18px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 10px;
      width: 90%;
      max-width: 520px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 28px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
    }

    .modal-close:hover { color: #fff; }

    .modal-name {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .modal-subtitle {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    .modal-section {
      margin-bottom: 18px;
    }

    .modal-section-title {
      font-size: 10px;
      color: #60a5fa;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #1f2937;
    }

    .modal-row {
      display: flex;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid #1f2937;
      font-size: 13px;
    }

    .modal-row:last-child { border-bottom: none; }

    .modal-label { color: #9ca3af; }
    .modal-value { color: #e2e8f0; font-weight: 500; text-align: right; max-width: 65%; }

    .modal-recommendation {
      background: #0f1a2e;
      border: 1px solid #1f3a5f;
      border-left: 3px solid #0076ce;
      border-radius: 4px;
      padding: 14px;
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .lead-card { cursor: pointer; }
  </style>
</head>
<body>

  <div class="brand-bar">
    <div class="logo">DELL Technologies</div>
    <div class="live-indicator">
      <div class="live-dot"></div>
      <span>Live — auto-refreshes every 10s</span>
    </div>
  </div>

  <div class="team-selector">
    <label>Select Your Team</label>
    <select id="teamSelect">
      <option value="" disabled selected>— Choose your Dell team —</option>
      <option value="Client Solutions Group (CSG)">Client Solutions Group (CSG) — AI PCs</option>
      <option value="Infrastructure Solutions Group (ISG)">Infrastructure Solutions Group (ISG) — Storage</option>
      <option value="APEX & Cloud Services">APEX & Cloud Services — Cloud</option>
      <option value="Professional Services">Professional Services — Consultancy</option>
      <option value="General Sales">General Sales</option>
    </select>
    <button onclick="loadTeamLeads()">View My Leads</button>
  </div>

  <div class="main">
    <div class="error-msg" id="errorMsg"></div>
    <div class="loading" id="loadingMsg">Loading leads for your team...</div>

    <div class="team-header" id="teamHeader">
      <h2 id="teamTitle"></h2>
      <p id="teamSubtitle"></p>
      <p class="last-updated" id="lastUpdated"></p>
    </div>

    <div class="stats-row" id="statsRow" style="display:none;"></div>

    <div class="leads-grid" id="leadsGrid"></div>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📭</div>
      <p>No leads assigned to this team yet.</p>
    </div>
  </div>

  <!-- Lead Detail Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modalContent">
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-subtitle" id="modalSubtitle"></div>

      <div class="modal-section">
        <div class="modal-section-title">Contact Information</div>
        <div class="modal-row"><span class="modal-label">Email</span><span class="modal-value" id="modalEmail"></span></div>
        <div class="modal-row"><span class="modal-label">Phone</span><span class="modal-value" id="modalPhone"></span></div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Company Details</div>
        <div class="modal-row"><span class="modal-label">Company</span><span class="modal-value" id="modalCompany"></span></div>
        <div class="modal-row"><span class="modal-label">Company Size</span><span class="modal-value" id="modalCompanySize"></span></div>
        <div class="modal-row"><span class="modal-label">Tier</span><span class="modal-value" id="modalTier"></span></div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Lead Profile</div>
        <div class="modal-row"><span class="modal-label">Interest Area</span><span class="modal-value" id="modalInterest"></span></div>
        <div class="modal-row"><span class="modal-label">Assigned Team</span><span class="modal-value" id="modalTeam"></span></div>
        <div class="modal-row"><span class="modal-label">Processed</span><span class="modal-value" id="modalProcessed"></span></div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">⚡ AI Recommended Action</div>
        <div class="modal-recommendation" id="modalRecommendation"></div>
      </div>
    </div>
  </div>

  <script>
    async function loadTeamLeads() {
      const teamSelect = document.getElementById("teamSelect");
      const teamName = teamSelect.value;

      if (!teamName) {
        showError("Please select your team first.");
        return;
      }

      hideError();
      showLoading(true);
      clearResults();

      try {
        const res = await fetch(`/api/leads/team/${encodeURIComponent(teamName)}`);
        if (!res.ok) throw new Error("Server error: " + res.status);
        const leads = await res.json();

        showLoading(false);
        renderTeamHeader(teamName, leads.length);
        renderStats(leads);

        if (leads.length === 0) {
          document.getElementById("emptyState").style.display = "block";
          return;
        }

        renderLeads(leads);

      } catch (err) {
        showLoading(false);
        showError("Could not load leads: " + err.message);
      }
    }

    function renderTeamHeader(teamName, count) {
      document.getElementById("teamTitle").textContent = teamName;
      document.getElementById("teamSubtitle").textContent =
        `${count} lead${count !== 1 ? "s" : ""} assigned to your team from the event`;
      document.getElementById("teamHeader").style.display = "block";
      document.getElementById("lastUpdated").textContent =
        "Last updated: " + new Date().toLocaleTimeString();
    }

    // Silent refresh — no loading spinner, just updates data quietly
    async function silentRefresh() {
      const teamName = document.getElementById("teamSelect").value;
      if (!teamName) return;

      try {
        const res = await fetch(`/api/leads/team/${encodeURIComponent(teamName)}`);
        if (!res.ok) return;
        const leads = await res.json();

        renderTeamHeader(teamName, leads.length);
        renderStats(leads);

        if (leads.length === 0) {
          document.getElementById("emptyState").style.display = "block";
          document.getElementById("leadsGrid").innerHTML = "";
        } else {
          document.getElementById("emptyState").style.display = "none";
          renderLeads(leads);
        }
      } catch (err) {
        // Silent fail — don't show error on auto refresh
      }
    }

    // Auto-refresh every 5 seconds
    setInterval(silentRefresh, 5000);

    function renderStats(leads) {
      const statsRow = document.getElementById("statsRow");

      const enterprise = leads.filter(l => l.companySize >= 1000).length;
      const midmarket  = leads.filter(l => l.companySize >= 200 && l.companySize < 1000).length;
      const small      = leads.filter(l => l.companySize < 200).length;

      statsRow.innerHTML = `
        <div class="stat-card">
          <div class="stat-num" style="color:#60a5fa;">${leads.length}</div>
          <div class="stat-label">Total Leads</div>
        </div>
        <div class="stat-card" style="border-color: rgba(234,179,8,0.3); background: rgba(234,179,8,0.05);">
          <div class="stat-num" style="color:#eab308;">${enterprise}</div>
          <div class="stat-label" style="color:#eab308;">🏢 Enterprise (1000+)</div>
        </div>
        <div class="stat-card" style="border-color: rgba(139,92,246,0.3); background: rgba(139,92,246,0.05);">
          <div class="stat-num" style="color:#a78bfa;">${midmarket}</div>
          <div class="stat-label" style="color:#a78bfa;">🏬 Mid-Market (200–999)</div>
        </div>
        <div class="stat-card" style="border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.05);">
          <div class="stat-num" style="color:#4ade80;">${small}</div>
          <div class="stat-label" style="color:#4ade80;">🏪 Small Business (&lt;200)</div>
        </div>
      `;
      statsRow.style.display = "grid";
    }

    let leadsData = [];

    function getTier(companySize) {
      const size = parseInt(companySize) || 0;
      if (size >= 1000) return "enterprise";
      if (size >= 200) return "midmarket";
      return "small";
    }

    function getTierLabel(companySize) {
      const size = parseInt(companySize) || 0;
      if (size >= 1000) return { label: "Enterprise", cls: "enterprise" };
      if (size >= 200)  return { label: "Mid-Market", cls: "midmarket" };
      return                   { label: "Small Business", cls: "small" };
    }

    function renderLeads(leads) {
      leadsData = leads;
      const grid = document.getElementById("leadsGrid");

      // Group by tier
      const groups = { enterprise: [], midmarket: [], small: [] };
      leads.forEach((lead, index) => {
        const tier = getTier(lead.companySize);
        if (groups[tier]) {
          groups[tier].push({ lead, index });
        }
      });

      const tierTitles = {
        enterprise: "🏢 Enterprise",
        midmarket:  "🏬 Mid-Market",
        small:      "🏪 Small Business"
      };

      let html = "";

      ["enterprise", "midmarket", "small"].forEach(tier => {
        html += `<div class="tier-column">`;
        html += `<div class="tier-section-title ${tier}">${tierTitles[tier]} — ${groups[tier].length} lead${groups[tier].length !== 1 ? "s" : ""}</div>`;

        if (groups[tier].length === 0) {
          html += `<div style="color:#4b5563; font-size:13px; padding:12px 0;">No leads in this tier</div>`;
        }

        groups[tier].forEach(({ lead, index }) => {
          const initials = lead.name
            ? lead.name.split(" ").map(n => n[0]).join("").toUpperCase().slice(0, 2)
            : "??";

          html += `
            <div class="lead-card ${tier}" onclick="openModal(${index})">
              <div class="lead-card-header">
                <div class="avatar">${initials}</div>
                <div>
                  <div class="lead-name">${lead.name || "Unknown"}</div>
                  <div class="lead-title">${lead.jobTitle || "No title"} · ${lead.company || "Unknown company"}</div>
                </div>
              </div>
              <div class="lead-card-body">
                <span class="tier-label tier-${tier}">${tierTitles[tier].replace(/^.+ /, "")}</span>
                <div class="info-row">
                  <span class="info-label">Email</span>
                  <span class="info-value">${lead.email || "—"}</span>
                </div>
                <div class="info-row">
                  <span class="info-label">Phone</span>
                  <span class="info-value">${lead.phone || "—"}</span>
                </div>
                <div class="info-row">
                  <span class="info-label">Interest</span>
                  <span class="info-value"><span class="interest-badge">${lead.interest || "—"}</span></span>
                </div>
                <div class="recommendation-box">
                  <div class="rec-label">⚡ AI Recommended Action</div>
                  <div class="rec-text">${lead.action_recommendation || "No recommendation available."}</div>
                </div>
                <div style="margin-top:8px; color:#4b5563; font-size:11px; text-align:right;">Click for full details</div>
              </div>
            </div>
          `;
        });

        html += `</div>`;
      });

      grid.innerHTML = html;
    }

    function clearResults() {
      document.getElementById("leadsGrid").innerHTML = "";
      document.getElementById("teamHeader").style.display = "none";
      document.getElementById("statsRow").style.display = "none";
      document.getElementById("emptyState").style.display = "none";
    }

    function showLoading(show) {
      document.getElementById("loadingMsg").style.display = show ? "block" : "none";
    }

    function showError(msg) {
      const box = document.getElementById("errorMsg");
      box.textContent = msg;
      box.style.display = "block";
    }

    function hideError() {
      const box = document.getElementById("errorMsg");
      if (box) box.style.display = "none";
    }

    function formatSGT(dateStr) {
      if (!dateStr) return "—";
      const date = new Date(dateStr);
      return date.toLocaleString("en-SG", {
        timeZone: "Asia/Singapore",
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hour12: true
      }) + " SGT";
    }

    function openModal(index) {
      const lead = leadsData[index];
      if (!lead) return;

      const tierLabels = { enterprise: "🏢 Enterprise", midmarket: "🏬 Mid-Market", small: "🏪 Small Business" };
      const tier = lead.companySize >= 1000 ? "enterprise" : lead.companySize >= 200 ? "midmarket" : "small";

      document.getElementById("modalName").textContent = lead.name || "Unknown";
      document.getElementById("modalSubtitle").textContent = (lead.jobTitle || "No title") + " · " + (lead.company || "Unknown company");
      document.getElementById("modalEmail").textContent = lead.email || "—";
      document.getElementById("modalPhone").textContent = lead.phone || "—";
      document.getElementById("modalCompany").textContent = lead.company || "—";
      document.getElementById("modalCompanySize").textContent = lead.companySize ? lead.companySize + " employees" : "—";
      document.getElementById("modalTier").textContent = tierLabels[tier];
      document.getElementById("modalInterest").textContent = lead.interest || "—";
      document.getElementById("modalTeam").textContent = lead.assigned_team || "—";
      document.getElementById("modalProcessed").textContent = formatSGT(lead.processed_at || lead.created_at);
      document.getElementById("modalRecommendation").textContent = lead.action_recommendation || "No recommendation available.";

      document.getElementById("modalOverlay").classList.add("show");
    }

    function closeModal(event) {
      if (event.target === document.getElementById("modalOverlay")) {
        closeModalDirect();
      }
    }

    function closeModalDirect() {
      document.getElementById("modalOverlay").classList.remove("show");
    }
  </script>

</body>
</html>
